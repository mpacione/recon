# P4 Synthesis Pipeline Configuration

# Paths (relative to CompetitiveLandscape-2025 directory)
paths:
  competitors_dir: "Competitors"
  atlassian_dir: "Atlassian"
  themes_dir: "Themes"
  chroma_db: ".chroma_db"  # Hidden directory for vector store

# Embedding model (runs locally, no API key)
embedding:
  model: "all-MiniLM-L6-v2"  # Fast, good quality, 384 dimensions
  # Alternative: "all-mpnet-base-v2"  # Better quality, slower

# Chunking settings
chunking:
  chunk_size: 500  # tokens per chunk
  chunk_overlap: 50  # overlap between chunks

# Retrieval settings
retrieval:
  top_k: 50  # chunks per query
  queries_per_theme: 4  # multiple queries for better coverage

# Synthesis settings
synthesis:
  # model: "claude-sonnet-4-20250514"  # Use Sonnet for cost efficiency, Opus for quality
  model: "claude-opus-4-20250514"  # Highest quality
  max_tokens: 8192
  temperature: 0.3  # Lower = more focused

# Theme definitions
themes:
  agentic_shift:
    title: "The Agentic Shift"
    output_file: "_AgenticShift.md"
    queries:
      - "autonomous agents executing coding tasks without human approval"
      - "plan-and-execute workflows where AI proposes and human approves"
      - "L4 L5 autonomy level fully autonomous coding agents"
      - "risks failures and limitations of autonomous AI coding"
      - "human oversight patterns in AI-assisted development"

  platform_wars:
    title: "Platform Wars: Who Owns the Orchestration Layer"
    output_file: "_PlatformWars.md"
    queries:
      - "platform strategy developer ecosystem lock-in"
      - "IDE control surface integration ambient AI"
