<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>recon</title>
  <link rel="stylesheet" href="/static/theme.css">
  <script defer src="/static/app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="reconShell()">
  <div class="page">
    <header class="recon-header">
      <span class="recon-title">recon</span>
      <span class="recon-divider">|</span>
      <span class="recon-subtitle">competitive intelligence</span>
    </header>

    <main class="recon-body">
      <section class="section">
        <h2 class="section-divider">SCAFFOLD</h2>
        <p class="dim">
          Phase 1 shell. The full SPA mounts here in subsequent phases.
        </p>
        <p>
          Server is running. Health: <span x-text="health">checking...</span>
        </p>
      </section>
    </main>

    <footer class="keybinds">
      <span class="dim">phase 1 scaffold</span>
    </footer>
  </div>
</body>
</html>
