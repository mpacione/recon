<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>recon</title>
  <!-- Inter 4.0 (body + headings) and JetBrains Mono (data/markers).
       See theme.css for the token split; Inter ships via rsms.me,
       JetBrains Mono via Google Fonts. -->
  <link rel="preconnect" href="https://rsms.me">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/static/theme.css">
  <!-- Server-injected runtime config. The FastAPI root route swaps
       this comment for a <script> block setting window.RECON_HOME
       (and future config values). Kept as a comment in the static
       file so `file://` previews still load without syntax errors. -->
  <!--RECON_CONFIG-->
  <script defer src="/static/app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Lucide icons via Iconify. Used for functional UI chrome (remove
       buttons, nav affordances). State markers stay as Unicode
       geometric characters; see progressive-fidelity notes in
       web-ui-spec.md. -->
  <script type="module"
          src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body x-data="reconShell()" x-cloak>
  <div class="page">
    <header class="recon-header">
      <span class="recon-title">recon</span>
      <span class="recon-divider">|</span>
      <span class="recon-subtitle" x-text="headerSubtitle"></span>

      <nav class="flow-progress" x-show="flowVisible" aria-label="flow progress">
        <span class="dim" x-text="flowStepLabel"></span>
        <template x-for="(step, idx) in flowSteps" :key="step.key">
          <span class="flow-step-wrap">
            <span class="flow-sep" x-show="idx > 0" aria-hidden="true">&#8594;</span>
            <span class="flow-step"
                  :class="{
                    'amber': flowIndex === idx,
                    'flow-step-completed': flowIndex > idx,
                    'flow-step-current': flowIndex === idx,
                    'flow-step-future': flowIndex < idx,
                    'dim': flowIndex < idx,
                  }"
                  :role="flowStepState(idx) === 'completed' ? 'link' : null"
                  :tabindex="flowStepState(idx) === 'completed' ? 0 : null"
                  :aria-current="flowIndex === idx ? 'step' : null"
                  :aria-disabled="flowStepState(idx) === 'future' ? 'true' : null"
                  @click="navigateFlowStep(idx)"
                  @keydown.enter.prevent="navigateFlowStep(idx)"
                  @keydown.space.prevent="navigateFlowStep(idx)"
                  x-text="flowIndex === idx ? '[' + step.label + ']' : step.label">
            </span>
          </span>
        </template>
      </nav>
    </header>

    <main class="recon-body">
      <!-- Loading state shown while no screen is registered yet. -->
      <section class="section" x-show="!activeScreen">
        <h2 class="section-divider">LOADING</h2>
        <p class="dim">Initializing recon shell&hellip;</p>
      </section>

      <!-- Active screen is mounted here by the router. Each screen is
           a pre-defined <template> element above; the router copies
           one into the slot whenever the hash changes. -->
      <div id="screen-slot" x-ref="slot"></div>
    </main>

    <footer class="keybinds" aria-label="keybinds">
      <template x-for="bind in keybinds" :key="bind.key">
        <span class="keybind">
          <kbd x-text="bind.key"></kbd>
          <span x-text="bind.label"></span>
        </span>
      </template>
    </footer>
  </div>

  <!-- ===========================================================
       Screen templates. Each <template id="screen-<key>"> is the
       body Alpine clones into #screen-slot when the route changes.
       Per-screen JS modules register their own x-data factories
       (e.g. welcomeScreen()) in app.js or screens/*.js.
       =========================================================== -->

  <template id="screen-welcome">
    <section class="section" x-data="welcomeScreen()">
      <div class="welcome-hero">
        <div class="welcome-hero-copy">
          <h2 class="welcome-hero-title">Competitive intelligence, researched for you.</h2>
          <p class="dim welcome-hero-lede">
            Describe your space once &mdash; recon discovers competitors, researches each
            section, verifies the claims, and ships a structured brief.
          </p>
        </div>
        <a class="welcome-hero-cta" href="#/describe">
          <iconify-icon icon="lucide:plus" width="16" height="16" aria-hidden="true"></iconify-icon>
          New project
          <span class="welcome-hero-cta-kbd" aria-hidden="true">
            <kbd>n</kbd>
          </span>
        </a>
      </div>

      <h3 class="section-divider welcome-recents-heading">RECENT PROJECTS</h3>

      <p class="dim" x-show="loading">Loading recent projects&hellip;</p>
      <div class="empty-state welcome-empty" x-show="!loading && projects.length === 0">
        <iconify-icon class="empty-state-icon" icon="lucide:folder-plus" width="32" height="32" aria-hidden="true"></iconify-icon>
        <p class="empty-state-title">No projects yet.</p>
        <p class="empty-state-body">
          Start one by pressing <kbd>n</kbd> or clicking <strong>New project</strong> above.
        </p>
      </div>

      <ul class="recents" x-show="!loading && projects.length > 0">
        <template x-for="(project, i) in projects" :key="project.path">
          <li class="recent-item"
              :class="{ 'recent-item-missing': project.status === 'missing' }"
              @click="open(project)"
              :title="project.status === 'missing'
                        ? 'This directory is no longer on disk'
                        : ('Open ' + project.name)">
            <span class="recent-index" x-text="(i + 1) + '.'"></span>
            <span class="recent-marker mono"
                  :class="recentStatusClass(project.status)"
                  :title="recentStatusLabel(project.status)"
                  x-text="recentStatusMarker(project.status)"></span>
            <span class="recent-name" x-text="project.name"></span>
            <span class="recent-status mono"
                  :class="recentStatusClass(project.status)"
                  x-text="recentStatusLabel(project.status)"></span>
            <span class="dim recent-meta">
              <span x-text="formatDate(project.last_opened)"></span>
              &middot;
              <span x-text="shortPath(project.path)"></span>
            </span>
          </li>
        </template>
      </ul>
    </section>
  </template>

  <template id="screen-describe">
    <section class="section" x-data="describeScreen()">
      <h2 class="section-divider">DESCRIBE YOUR SPACE</h2>
      <p class="dim">
        Describe your company, product, or the competitive space you want to
        research. A sentence or two is enough &mdash; we&rsquo;ll figure out the rest.
      </p>

      <form @submit.prevent="submit()" class="describe-form">
        <label class="field">
          <span class="field-label">Description</span>
          <textarea
            x-model="description"
            x-ref="description"
            rows="4"
            placeholder="Bambu Lab makes consumer and prosumer 3D printers competing in desktop additive manufacturing"
            required></textarea>
        </label>

        <fieldset class="api-keys">
          <legend class="section-divider api-keys-legend">API KEYS</legend>
          <p class="dim">Stored in <code>.env</code>, persists across sessions.</p>
          <template x-for="provider in providers" :key="provider.name">
            <label class="field field-row">
              <span class="field-label" x-text="provider.label"></span>
              <input
                type="password"
                x-model="provider.value"
                :placeholder="provider.placeholder"
                autocomplete="off">
              <span class="field-status"
                    :class="{ success: provider.saved, dim: !provider.saved }"
                    x-text="provider.saved ? 'saved' : 'not set'"></span>
            </label>
          </template>
        </fieldset>

        <div class="actions">
          <button type="submit" class="primary" :disabled="submitting">
            <span x-show="!submitting">Continue</span>
            <span x-show="submitting">Creating workspace&hellip;</span>
          </button>
          <button type="button" @click="back()">Back</button>
        </div>

        <p class="error" x-show="error" x-text="error"></p>
      </form>
    </section>
  </template>

  <template id="screen-discover">
    <section class="section" x-data="discoverScreen()">
      <h2 class="section-divider">COMPETITOR DISCOVERY</h2>

      <p class="dim" x-show="loading">Loading competitors&hellip;</p>
      <p class="error" x-show="error" x-text="error"></p>

      <form @submit.prevent="add()" class="add-competitor" x-show="!loading">
        <label class="field-label">Add manually</label>
        <div class="add-row">
          <input type="text"
                 x-model="form.name"
                 placeholder="Company name"
                 required>
          <input type="text"
                 x-model="form.url"
                 placeholder="https://example.com (optional)">
          <button type="submit" class="primary" :disabled="!form.name || adding">
            <span x-show="!adding">Add</span>
            <span x-show="adding">Adding&hellip;</span>
          </button>
        </div>
        <textarea x-model="form.blurb"
                  rows="2"
                  placeholder="Short blurb (optional) &mdash; why this competitor matters"></textarea>
      </form>

      <div class="candidates" x-show="!loading">
        <h3 class="section-divider">
          <span>CANDIDATES</span>
          <span class="dim candidates-count"
                x-text="competitors.length + ' total'"></span>
        </h3>
        <p class="dim" x-show="competitors.length === 0">
          No competitors yet. Add at least one above to continue.
        </p>
        <ul class="candidate-list" x-show="competitors.length > 0">
          <template x-for="(c, idx) in competitors" :key="c.slug || c.name || idx">
            <li class="candidate-row"
                :class="{ 'candidate-row-own': c.type === 'own_product' }">
              <!-- Progressive-fill status marker, drawn with circles
                   to avoid confusion with the square checkbox glyphs
                   used by the research template screen:
                     \u25CB empty (waiting) \u2192 \u25D0 half (researching) \u2192 \u25CF full (ready).
                   Colors reinforce the same progression: dim/amber/success. -->
              <span class="candidate-marker"
                    :class="{ success: c.status === 'researched', amber: c.status !== 'scaffold' && c.status !== 'researched', dim: c.status === 'scaffold' }"
                    :title="candidateStatusLabel(c.status)"
                    x-text="c.status === 'researched' ? '\u25CF' : (c.status === 'scaffold' ? '\u25CB' : '\u25D0')"></span>

              <div class="candidate-body">
                <div class="candidate-headline">
                  <span class="candidate-name" x-text="c.name"></span>
                  <span class="candidate-tier"
                        :class="'candidate-tier-' + (c.type || 'competitor')"
                        x-text="candidateTierLabel(c.type)"></span>
                  <template x-if="c.url">
                    <a class="candidate-url"
                       :href="c.url"
                       target="_blank"
                       rel="noopener noreferrer"
                       :title="c.url"
                       :aria-label="'Open ' + c.name + ' website in a new tab'"
                       @click.stop>
                      <iconify-icon icon="lucide:external-link" width="13" height="13" aria-hidden="true"></iconify-icon>
                      <span class="candidate-url-host" x-text="candidateHost(c.url)"></span>
                    </a>
                  </template>
                </div>
                <template x-if="c.blurb">
                  <p class="candidate-blurb dim" x-text="c.blurb"></p>
                </template>
              </div>

              <span class="candidate-status"
                    :class="{ success: c.status === 'researched', amber: c.status !== 'scaffold' && c.status !== 'researched', dim: c.status === 'scaffold' }"
                    x-text="candidateStatusLabel(c.status)"></span>

              <button type="button" class="candidate-remove"
                      @click="remove(c)"
                      :aria-label="'Remove ' + c.name"
                      :title="'Remove ' + c.name">
                <iconify-icon icon="lucide:x" width="14" height="14"></iconify-icon>
              </button>
            </li>
          </template>
        </ul>
      </div>

      <div class="actions">
        <button type="button" class="primary"
                :disabled="competitors.length === 0"
                @click="proceed()">
          Done (<span x-text="competitors.length"></span> competitors)
        </button>
        <button type="button" @click="back()">Back</button>
      </div>
    </section>
  </template>

  <template id="screen-template">
    <section class="section" x-data="templateScreen()">
      <h2 class="section-divider">RESEARCH TEMPLATE</h2>
      <p class="dim">
        Each selected section will be researched for every competitor. Toggle
        what you want; you can always come back and adjust later.
      </p>

      <p class="dim" x-show="loading">Loading template&hellip;</p>
      <p class="error" x-show="error" x-text="error"></p>

      <div class="template-controls" x-show="!loading">
        <button type="button" @click="selectAll()">Select all</button>
        <button type="button" @click="deselectAll()">Deselect all</button>
        <span class="dim template-count">
          <span x-text="selectedCount"></span> of <span x-text="sections.length"></span> selected
        </span>
      </div>

      <ul class="checklist" x-show="!loading">
        <template x-for="section in sections" :key="section.key">
          <li class="checklist-item" @click="toggle(section)">
            <span class="checklist-marker"
                  :class="section.selected ? 'amber' : 'dim'"
                  x-text="section.selected ? '\u25A0' : '\u25A1'"></span>
            <span class="checklist-body">
              <span class="checklist-title" x-text="section.title"></span>
              <span class="dim checklist-desc" x-text="section.description"></span>
            </span>
          </li>
        </template>
      </ul>

      <div class="actions" x-show="!loading">
        <button type="button" class="primary"
                :disabled="selectedCount === 0 || saving"
                @click="proceed()">
          <span x-show="!saving">Continue (<span x-text="selectedCount"></span> sections)</span>
          <span x-show="saving">Saving&hellip;</span>
        </button>
        <button type="button" @click="back()">Back</button>
      </div>
    </section>
  </template>

  <template id="screen-confirm">
    <section class="section" x-data="confirmScreen()">
      <h2 class="section-divider">READY TO RESEARCH</h2>

      <p class="dim" x-show="loading">Loading estimate&hellip;</p>
      <p class="error" x-show="error" x-text="error"></p>

      <div x-show="!loading && data">
        <p>
          This will research <strong x-text="data?.competitor_count"></strong> competitor<span x-show="data?.competitor_count !== 1">s</span>
          across <strong x-text="data?.section_keys.length"></strong> section<span x-show="data?.section_keys.length !== 1">s</span> each.
          <span class="dim">
            &middot; <span x-text="formatEta(data?.eta_seconds)"></span> estimated
          </span>
        </p>

        <h3 class="section-divider">SECTIONS</h3>
        <ul class="confirm-sections">
          <template x-for="name in data?.section_names" :key="name">
            <li x-text="name"></li>
          </template>
        </ul>

        <h3 class="section-divider">COST BREAKDOWN</h3>
        <table class="cost-table">
          <tbody>
            <template x-for="(cost, stage) in data?.cost_by_stage" :key="stage">
              <tr>
                <td class="cost-label" x-text="stage"></td>
                <td class="cost-value" x-text="formatCost(cost)"></td>
              </tr>
            </template>
            <tr class="cost-total">
              <td class="cost-label">Total</td>
              <td class="cost-value" x-text="formatCost(data?.estimated_total)"></td>
            </tr>
          </tbody>
        </table>

        <h3 class="section-divider">MODEL</h3>
        <ul class="radio-list">
          <template x-for="opt in data?.model_options" :key="opt.id">
            <li class="radio-item" @click="selectedModel = opt.id">
              <span class="radio-marker"
                    :class="selectedModel === opt.id ? 'amber' : 'dim'"
                    x-text="selectedModel === opt.id ? '\u25C9' : '\u25CB'"></span>
              <span class="radio-label" x-text="opt.label"></span>
              <span class="dim radio-price"
                    x-text="'$' + opt.input_price_per_million + ' / $' + opt.output_price_per_million + ' per M'"></span>
              <span class="radio-total" x-text="formatCost(opt.estimated_total)"></span>
              <span class="dim radio-desc" x-text="opt.description"></span>
            </li>
          </template>
        </ul>

        <h3 class="section-divider">WORKERS</h3>
        <div class="workers-control">
          <button type="button" @click="workers = Math.max(1, workers - 1)" :disabled="workers <= 1">-</button>
          <span class="workers-value amber" x-text="workers"></span>
          <button type="button" @click="workers = Math.min(16, workers + 1)" :disabled="workers >= 16">+</button>
          <span class="dim">parallel workers</span>
        </div>

        <p class="notice" role="note">
          <iconify-icon icon="lucide:info" width="16" height="16" aria-hidden="true"></iconify-icon>
          <span>
            Preview run &mdash; uses a deterministic fake LLM so no API charges are incurred.
            Real-LLM mode lands in a follow-up release.
          </span>
        </p>

        <p class="error" x-show="error" x-text="error"></p>

        <div class="actions">
          <button type="button" class="primary"
                  :disabled="starting"
                  @click="start()">
            <span x-show="!starting">Start research</span>
            <span x-show="starting">Starting&hellip;</span>
          </button>
          <button type="button" @click="back()" :disabled="starting">Back</button>
        </div>
      </div>
    </section>
  </template>

  <!-- =============================================================
       Placeholder screens. The router resolves these so deep links
       never land on "unknown screen", but the features themselves
       arrive in a follow-up release. Each screen wears the same
       empty-state shell so users learn the pattern.
       ============================================================= -->

  <template id="screen-run">
    <section class="section" x-data="runScreen()">
      <h2 class="section-divider">RESEARCH RUN</h2>

      <p class="error" x-show="error" x-text="error"></p>

      <div class="run-header">
        <div class="run-phase">
          <span class="dim">phase:</span>
          <span class="amber" x-text="phase"></span>
        </div>
        <div class="run-cost">
          <span class="dim">cost:</span>
          <span class="amber" x-text="formatCost()"></span>
        </div>
      </div>

      <div class="run-progress-track" role="progressbar"
           :aria-valuenow="progressPercent" aria-valuemin="0" aria-valuemax="100">
        <div class="run-progress-fill" :style="`width: ${progressPercent}%`"></div>
      </div>
      <p class="run-progress-label dim">
        <span x-text="progressPercent"></span>%
      </p>

      <h3 class="section-divider">ACTIVITY</h3>
      <div class="run-activity">
        <p class="dim" x-show="activity.length === 0">Waiting for first event&hellip;</p>
        <template x-for="entry in activity" :key="entry.stamp + ':' + entry.line">
          <div class="run-activity-row">
            <span class="run-activity-stamp dim" x-text="entry.stamp"></span>
            <span class="run-activity-line" x-text="entry.line"></span>
          </div>
        </template>
      </div>

      <div class="actions" x-show="isTerminal">
        <button type="button" class="primary"
                x-show="status === 'done'"
                @click="goToResults()">
          View results
        </button>
        <button type="button" @click="goToDashboard()">
          Dashboard
        </button>
      </div>
    </section>
  </template>

  <template id="screen-results">
    <section class="section" x-data="resultsScreen()">
      <h2 class="section-divider">RESEARCH COMPLETE</h2>

      <p class="dim" x-show="loading">Loading results&hellip;</p>
      <p class="error" x-show="error" x-text="error"></p>

      <!-- No artifacts yet: the workspace was set up but no run has
           produced an exec summary or theme files. Point the user
           back at the dashboard to kick off a run instead of leaving
           them on an empty screen. -->
      <div class="empty-state" x-show="!loading && !error && !hasAnyArtifact">
        <iconify-icon class="empty-state-icon" icon="lucide:sparkles" width="36" height="36" aria-hidden="true"></iconify-icon>
        <p class="empty-state-title">No results yet.</p>
        <p class="empty-state-body">
          Run the research pipeline first &mdash; the executive summary and per-theme
          briefs will land here when the run completes.
        </p>
        <div class="empty-state-actions">
          <a class="button-link" :href="dashboardHash()">
            <iconify-icon icon="lucide:layout-dashboard" width="14" height="14" aria-hidden="true"></iconify-icon>
            Open dashboard
          </a>
          <a class="button-link" href="#/welcome">
            <iconify-icon icon="lucide:arrow-left" width="14" height="14" aria-hidden="true"></iconify-icon>
            Back to projects
          </a>
        </div>
      </div>

      <div x-show="!loading && !error && hasAnyArtifact">
        <!-- Executive summary preview. The backend caps it at ~2KB so
             the payload stays small; users who want the full doc read
             the file path shown below. -->
        <template x-if="hasSummary">
          <div class="results-summary">
            <h3 class="section-divider">EXECUTIVE SUMMARY</h3>
            <p class="dim results-summary-path mono"
               x-text="data.executive_summary_path"></p>
            <pre class="results-summary-preview"
                 x-text="data.executive_summary_preview"></pre>
          </div>
        </template>

        <template x-if="(data?.theme_files?.length || 0) > 0">
          <div class="results-themes">
            <h3 class="section-divider">
              <span>THEMES</span>
              <span class="dim" x-text="data.theme_files.length + ' total'"></span>
            </h3>
            <ul class="results-theme-list">
              <template x-for="(t, idx) in data.theme_files"
                        :key="t.name || t.path || idx">
                <li class="results-theme-row">
                  <span class="results-theme-marker success mono"
                        aria-hidden="true">&#9632;</span>
                  <div class="results-theme-body">
                    <span class="results-theme-title"
                          x-text="t.title || t.name"></span>
                    <span class="dim results-theme-path mono"
                          x-text="t.path"></span>
                  </div>
                  <template x-if="t.distilled_path">
                    <span class="results-theme-badge mono"
                          :title="t.distilled_path">distilled</span>
                  </template>
                </li>
              </template>
            </ul>
          </div>
        </template>

        <div class="actions">
          <a class="button-link" :href="dashboardHash()">
            <iconify-icon icon="lucide:layout-dashboard" width="14" height="14" aria-hidden="true"></iconify-icon>
            Dashboard
          </a>
          <a class="button-link" href="#/welcome">
            <iconify-icon icon="lucide:arrow-left" width="14" height="14" aria-hidden="true"></iconify-icon>
            Back to projects
          </a>
        </div>
      </div>
    </section>
  </template>

  <template id="screen-dashboard">
    <section class="section" x-data="dashboardScreen()">
      <h2 class="section-divider">DASHBOARD
        <span class="badge-soon" aria-label="coming soon">soon</span>
      </h2>

      <p class="dim" x-show="loading">Loading workspace&hellip;</p>
      <p class="error" x-show="error" x-text="error"></p>

      <div x-show="!loading && workspace">
        <p>
          <strong x-text="workspace?.company_name"></strong>
          <span class="dim"> &middot; </span>
          <span class="dim" x-text="workspace?.domain"></span>
        </p>
        <p class="dim">
          <span x-text="workspace?.competitor_count"></span>
          competitor<span x-show="workspace?.competitor_count !== 1">s</span>
          &middot;
          <span x-text="workspace?.section_count"></span>
          section<span x-show="workspace?.section_count !== 1">s</span>
        </p>
      </div>

      <div class="empty-state">
        <iconify-icon class="empty-state-icon" icon="lucide:layout-dashboard" width="36" height="36" aria-hidden="true"></iconify-icon>
        <p class="empty-state-title">The full project dashboard is on the way.</p>
        <p class="empty-state-body">
          Resume, re-run, or browse existing research on any saved workspace. Until
