<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>recon</title>
  <!-- Departure Mono (CC0 pixel face by Helena Zhang) is self-hosted
       under /static/fonts/. @font-face lives in theme.css; preloading
       here keeps the bitmap crisp before paint. -->
  <link rel="preload"
        href="/static/fonts/DepartureMono-Regular.woff2"
        as="font"
        type="font/woff2"
        crossorigin="anonymous">
  <!-- primitives.css is the one-and-only stylesheet. Vocabulary:
       .box / .box-title / .box-nested for panels, .row + .col-*
       for list items, .stack / .inline for flex layout, .btn /
       .alert / .badge / .bar / .marker / .keybar for chrome. -->
  <link rel="stylesheet" href="/static/primitives.css">
  <!-- Server-injected runtime config. The FastAPI root route swaps
       this comment for a <script> block setting window.RECON_HOME
       (and future config values). Kept as a comment in the static
       file so `file://` previews still load without syntax errors. -->
  <!--RECON_CONFIG-->
  <!-- Theme preflight: read the persisted theme from localStorage and
       set <html data-theme="..."> before paint. Without this, the
       default palette flashes for a frame whenever a non-default theme
       is active. Kept inline + synchronous so it runs before first
       paint; the allowlist keeps the attribute write safe against
       tampered storage values. -->
  <script>
    (function () {
      var allowed = ['amber', 'dark', 'matrix', 'crypt'];
      try {
        var saved = localStorage.getItem('recon:theme');
        if (allowed.indexOf(saved) !== -1) {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch (_err) { /* localStorage disabled — fall back to default */ }
    })();
  </script>
  <script defer src="/static/app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Lucide icons via Iconify. Used for functional UI chrome (remove
       buttons, nav affordances). State markers stay as Unicode
       geometric characters; see progressive-fidelity notes in
       web-ui-spec.md. -->
  <script type="module"
          src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body x-data="reconShell()" x-cloak>
  <div class="page">
    <header class="inline" style="border-bottom: 1px solid var(--recon-border); padding-bottom: 1ch; flex-wrap: wrap;">
      <span class="amber ucase">recon</span>
      <span class="dim">|</span>
      <span class="dim" x-text="headerSubtitle"></span>

      <nav class="inline inline-tight"
           x-show="flowVisible"
           style="margin-left: 2ch;"
           aria-label="flow progress">
        <template x-for="(step, idx) in flowSteps" :key="step.key">
          <span class="inline inline-tight">
            <span class="dim" x-show="idx > 0" aria-hidden="true">&rarr;</span>
            <span :class="flowIndex === idx ? 'amber' : 'dim'"
                  :role="flowStepState(idx) === 'completed' ? 'link' : null"
                  :tabindex="flowStepState(idx) === 'completed' ? 0 : null"
                  :aria-current="flowIndex === idx ? 'step' : null"
                  :aria-disabled="flowStepState(idx) === 'future' ? 'true' : null"
                  @click="navigateFlowStep(idx)"
                  @keydown.enter.prevent="navigateFlowStep(idx)"
                  @keydown.space.prevent="navigateFlowStep(idx)"
                  style="cursor: pointer;"
                  x-text="flowIndex === idx ? '[' + step.label + ']' : step.label">
            </span>
          </span>
        </template>
      </nav>

      <div class="theme-picker"
           x-data="themePicker()"
           @click.outside="open = false"
           style="position: relative; margin-left: auto;">
        <button type="button"
                @click="open = !open"
                :aria-expanded="open"
                aria-haspopup="menu"
                aria-label="Switch theme">
          <span class="dim" x-text="activeLabel()"></span>
        </button>
        <ul role="menu"
            x-show="open"
            x-cloak
            x-transition.opacity
            class="box box-tight"
            style="position: absolute; top: calc(100% + 0.5ch); right: 0; z-index: 20; min-width: 32ch; background: var(--recon-panel);">
          <template x-for="opt in options" :key="opt.key">
            <li role="none">
              <button type="button"
                      role="menuitemradio"
                      :aria-checked="active === opt.key"
                      @click="select(opt.key); open = false"
                      class="row row-hover"
                      style="grid-template-columns: 2ch minmax(0, 1fr) auto; width: 100%; border: none; background: transparent; text-align: left;">
                <span class="col-mark"
                      :class="active === opt.key ? 'marker-amber' : 'marker-dim'"
                      x-text="active === opt.key ? '\u25C9' : '\u25CB'"></span>
                <span :class="active === opt.key ? 'amber' : ''" x-text="opt.label"></span>
                <span class="dim" x-text="opt.description"></span>
              </button>
            </li>
          </template>
        </ul>
      </div>
    </header>

    <main>
      <section class="box stack" x-show="!activeScreen">
        <h2 class="box-title">LOADING</h2>
        <p class="dim">Initializing recon shell&hellip;</p>
      </section>
      <div id="screen-slot" x-ref="slot"></div>
    </main>

    <footer class="keybar" aria-label="keybinds">
      <template x-for="bind in keybinds" :key="bind.key">
        <span>
          <kbd x-text="bind.key"></kbd>
          <span x-text="bind.label"></span>
        </span>
      </template>
    </footer>
  </div>

  <!-- ===========================================================
       Screen templates. Each <template id="screen-<key>"> is the
       body Alpine clones into #screen-slot when the route changes.
       Per-screen JS modules register their own x-data factories
       (e.g. welcomeScreen()) in app.js or screens/*.js.
       =========================================================== -->

  <template id="screen-welcome">
    <section class="box box-loose stack" x-data="welcomeScreen()">
      <!-- ASCII block-letter brand mark. Box-drawing chars only —
           no emoji. The mini variant swaps in under 560px. -->
      <pre class="recon-ascii-logo recon-ascii-logo-full" aria-hidden="true">
██████╗ ███████╗ ██████╗ ██████╗ ███╗   ██╗
██╔══██╗██╔════╝██╔════╝██╔═══██╗████╗  ██║
██████╔╝█████╗  ██║     ██║   ██║██╔██╗ ██║
██╔══██╗██╔══╝  ██║     ██║   ██║██║╚██╗██║
██║  ██║███████╗╚██████╗╚██████╔╝██║ ╚████║
╚═╝  ╚═╝╚══════╝ ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝</pre>
      <pre class="recon-ascii-logo recon-ascii-logo-mini" aria-hidden="true">
╦═╗╔═╗╔═╗╔═╗╔╗╔
╠╦╝║╣ ║  ║ ║║║║
╩╚═╚═╝╚═╝╚═╝╝╚╝</pre>

      <div class="stack stack-tight">
        <p>Competitive intelligence, researched for you.</p>
        <p class="dim">
          Describe your space once &mdash; recon discovers competitors, researches each
          section, verifies the claims, and ships a structured brief.
        </p>
      </div>

      <div class="inline inline-tight">
        <a class="btn btn-primary" href="#/describe">+ New project <kbd>n</kbd></a>
      </div>

      <section class="box box-tight box-nested">
        <h2 class="box-title">RECENT</h2>

        <p class="dim" x-show="loading">Loading recent projects&hellip;</p>

        <div class="stack stack-tight" x-show="!loading && projects.length === 0">
          <p class="dim">No projects yet.</p>
          <p class="dim">Press <kbd>n</kbd> to start one.</p>
        </div>

        <ul class="rows-numbered" x-show="!loading && projects.length > 0">
          <template x-for="(project, i) in projects" :key="project.path">
            <li class="row row-hover"
                :class="{ 'trunc': true, dim: project.status === 'missing' }"
                @click="open(project)"
                :title="project.status === 'missing'
                          ? 'This directory is no longer on disk'
                          : ('Open ' + project.name)">
              <span class="col-num" x-text="(i + 1) + '.'"></span>
              <span class="col-mark"
                    :class="recentStatusClass(project.status)"
                    :title="recentStatusLabel(project.status)"
                    x-text="recentStatusMarker(project.status)"></span>
              <span class="col-name"
                    :class="{ 'recent-item-missing': project.status === 'missing' }"
                    x-text="project.name"></span>
              <span class="col-stat"
                    :class="recentStatusClass(project.status)"
                    x-text="recentStatusLabel(project.status)"></span>
              <span class="col-meta trunc"
                    x-text="formatDate(project.last_opened) + ' · ' + shortPath(project.path)"></span>
            </li>
          </template>
        </ul>
      </section>
    </section>
  </template>

  <template id="screen-describe">
    <section class="box stack" x-data="describeScreen()">
      <h2 class="box-title">DESCRIBE</h2>
      <p class="dim">
        Describe your company, product, or the competitive space you want to
        research. A sentence or two is enough &mdash; we&rsquo;ll figure out the rest.
      </p>

      <form @submit.prevent="submit()" class="stack">
        <label class="field">
          <span class="label">Description</span>
          <textarea
            x-model="description"
            x-ref="description"
            rows="4"
            placeholder="Bambu Lab makes consumer and prosumer 3D printers competing in desktop additive manufacturing"
            required></textarea>
        </label>

        <p class="dim" x-show="pathPreview">
          <span class="label">Path</span>
          <code x-text="pathPreview"></code>
          <span class="dim">&middot; auto-numbered if it exists</span>
        </p>

        <section class="box box-tight box-nested">
          <h3 class="box-title">API KEYS</h3>
          <p class="dim">
            Stored in <code>~/.recon/.env</code> and reused across projects.
            <span x-show="providers.some(p => p.saved)">Fill a field below to overwrite an existing key.</span>
          </p>
          <div class="stack stack-tight">
            <template x-for="provider in providers" :key="provider.name">
              <label class="field field-row">
                <span class="label" x-text="provider.label"></span>
                <input
                  type="password"
                  x-model="provider.value"
                  :placeholder="provider.saved ? '\u2022\u2022\u2022\u2022 already saved' : provider.placeholder"
                  autocomplete="off">
                <span :class="provider.saved ? 'success' : 'dim'"
                      x-text="provider.saved ? 'saved' : 'not set'"></span>
              </label>
            </template>
          </div>
        </section>

        <div class="inline">
          <button type="submit" class="btn-primary" :disabled="submitting">
            <span x-show="!submitting">Continue</span>
            <span x-show="submitting">Creating workspace&hellip;</span>
          </button>
          <button type="button" @click="back()">Back</button>
        </div>

        <p class="alert alert-error" x-show="error" x-text="error"></p>
      </form>
    </section>
  </template>

  <template id="screen-discover">
    <section class="box stack" x-data="discoverScreen()">
      <h2 class="box-title">DISCOVERY</h2>

      <p class="dim" x-show="loading">Loading competitors&hellip;</p>
      <p class="alert alert-error" x-show="error" x-text="error"></p>

      <!-- LLM search -->
      <section class="box box-tight box-nested stack stack-tight" x-show="!loading">
        <h3 class="box-title">FIND</h3>
        <div class="inline inline-loose" style="justify-content: space-between;">
          <p class="dim">
            Ask recon to search for competitors in your space.
            Uses your saved Gemini / Anthropic key.
          </p>
          <button type="button" class="btn-primary"
                  @click="search()"
                  :disabled="searching">
            <span x-show="!searching">Search</span>
            <span x-show="searching">Searching&hellip;</span>
          </button>
        </div>

        <p class="alert alert-error" x-show="searchError" x-text="searchError"></p>
        <p class="dim"
           x-show="!searching && searchMessage && !searchError"
           x-text="searchMessage"></p>

        <ul class="stack stack-tight" x-show="pendingDiscovered.length > 0">
          <template x-for="cand in pendingDiscovered" :key="cand.name">
            <li class="row" style="grid-template-columns: minmax(0, 1fr) auto;">
              <div class="stack stack-tight" style="min-width: 0;">
                <span class="inline inline-tight">
                  <span class="amber" x-text="cand.name"></span>
                  <template x-if="cand.url">
                    <a :href="cand.url" target="_blank" rel="noopener noreferrer"
                       :title="cand.url" @click.stop
                       class="dim"
                       x-text="candidateHost(cand.url)"></a>
                  </template>
                </span>
                <template x-if="cand.blurb">
                  <p class="dim trunc" x-text="cand.blurb"></p>
                </template>
              </div>
              <div class="inline inline-tight">
                <button type="button" class="btn-primary" @click="accept(cand)">Add</button>
                <button type="button" @click="reject(cand)">Skip</button>
              </div>
            </li>
          </template>
        </ul>
      </section>

      <!-- Manual add -->
      <form @submit.prevent="add()" class="stack stack-tight" x-show="!loading">
        <span class="label">Add manually</span>
        <div class="inline inline-tight">
          <input type="text" x-model="form.name" placeholder="Company name" required>
          <input type="text" x-model="form.url" placeholder="https://example.com (optional)">
          <button type="submit" class="btn-primary" :disabled="!form.name || adding">
            <span x-show="!adding">Add</span>
            <span x-show="adding">Adding&hellip;</span>
          </button>
        </div>
        <textarea x-model="form.blurb" rows="2"
                  placeholder="Short blurb (optional) &mdash; why this competitor matters"></textarea>
      </form>

      <!-- Candidates list -->
      <section class="box box-tight box-nested stack stack-tight" x-show="!loading">
        <h3 class="box-title">
          <span>CANDIDATES</span>
          <span class="dim" style="margin-left: 1ch;"
                x-text="competitors.length + ' total'"></span>
        </h3>
        <p class="dim" x-show="competitors.length === 0">
          No competitors yet. Add at least one above to continue.
        </p>
        <ul class="stack stack-tight" x-show="competitors.length > 0">
          <template x-for="(c, idx) in competitors" :key="c.slug || c.name || idx">
            <li class="row" style="grid-template-columns: 2ch minmax(0, 1fr) 14ch 2ch;">
              <span class="col-mark"
                    :class="{ 'marker-ok': c.status === 'researched',
                              'marker-amber': c.status !== 'scaffold' && c.status !== 'researched',
                              'marker-dim': c.status === 'scaffold' }"
                    :title="candidateStatusLabel(c.status)"
                    x-text="c.status === 'researched' ? '\u25CF' : (c.status === 'scaffold' ? '\u25CB' : '\u25D0')"></span>
              <span class="trunc">
                <span class="amber" x-text="c.name"></span>
                <template x-if="c.url">
                  <a :href="c.url" target="_blank" rel="noopener noreferrer"
                     :title="c.url" @click.stop class="dim"
                     style="margin-left: 1ch;"
                     x-text="candidateHost(c.url)"></a>
                </template>
              </span>
              <span class="col-stat right"
                    :class="{ success: c.status === 'researched',
                              amber: c.status !== 'scaffold' && c.status !== 'researched',
                              dim: c.status === 'scaffold' }"
                    x-text="candidateStatusLabel(c.status)"></span>
              <button type="button" class="dim"
                      style="border: none; padding: 0;"
                      @click="remove(c)"
                      :aria-label="'Remove ' + c.name"
                      :title="'Remove ' + c.name">×</button>
            </li>
          </template>
        </ul>
      </section>

      <div class="inline">
        <button type="button" class="btn-primary"
                :disabled="competitors.length === 0"
                @click="proceed()">
          Done (<span x-text="competitors.length"></span>)
        </button>
        <button type="button" @click="back()">Back</button>
      </div>
    </section>
  </template>

  <template id="screen-template">
    <section class="box stack" x-data="templateScreen()">
      <h2 class="box-title">TEMPLATE</h2>
      <p class="dim">
        Each selected section will be researched for every competitor. Toggle
        what you want; you can always come back and adjust later.
      </p>

      <p class="dim" x-show="loading">Loading template&hellip;</p>
      <p class="alert alert-error" x-show="error" x-text="error"></p>

      <div class="inline" x-show="!loading">
        <button type="button" @click="selectAll()">Select all</button>
        <button type="button" @click="deselectAll()">Deselect all</button>
        <span class="dim" style="margin-left: auto;">
          <span x-text="selectedCount"></span> of <span x-text="sections.length"></span> selected
        </span>
      </div>

      <ul class="stack stack-tight" x-show="!loading">
        <template x-for="section in sections" :key="section.key">
          <li class="row row-hover" style="grid-template-columns: 2ch minmax(0, 1fr);" @click="toggle(section)">
            <span class="col-mark"
                  :class="section.selected ? 'marker-amber' : 'marker-dim'"
                  x-text="section.selected ? '\u25A0' : '\u25A1'"></span>
            <span class="trunc">
              <span :class="section.selected ? 'amber' : ''" x-text="section.title"></span>
              <span class="dim" style="margin-left: 1ch;" x-text="section.description"></span>
            </span>
          </li>
        </template>
      </ul>

      <div class="inline" x-show="!loading">
        <button type="button" class="btn-primary"
                :disabled="selectedCount === 0 || saving"
                @click="proceed()">
          <span x-show="!saving">Continue (<span x-text="selectedCount"></span>)</span>
          <span x-show="saving">Saving&hellip;</span>
        </button>
        <button type="button" @click="back()">Back</button>
      </div>
    </section>
  </template>

  <template id="screen-confirm">
    <section class="box stack" x-data="confirmScreen()">
      <h2 class="box-title">CONFIRM</h2>

      <p class="dim" x-show="loading">Loading estimate&hellip;</p>
      <p class="alert alert-error" x-show="error" x-text="error"></p>

      <div x-show="!loading && data" class="stack">
        <p>
          <span class="amber" x-text="data?.competitor_count"></span> competitor<span x-show="data?.competitor_count !== 1">s</span>
          &middot; <span class="amber" x-text="data?.section_keys.length"></span> section<span x-show="data?.section_keys.length !== 1">s</span>
          &middot; <span class="dim" x-text="formatEta(data?.eta_seconds)"></span>
        </p>

        <section class="box box-tight box-nested stack stack-tight">
          <h3 class="box-title">SECTIONS</h3>
          <ul class="inline" style="flex-wrap: wrap;">
            <template x-for="name in data?.section_names" :key="name">
              <li class="badge" x-text="name"></li>
            </template>
          </ul>
        </section>

        <section class="box box-tight box-nested stack stack-tight">
          <h3 class="box-title">COST</h3>
          <ul class="stack stack-tight">
            <template x-for="(cost, stage) in data?.cost_by_stage" :key="stage">
              <li class="row" style="grid-template-columns: minmax(0, 1fr) auto;">
                <span class="dim ucase" x-text="stage"></span>
                <span class="amber" x-text="formatCost(cost)"></span>
              </li>
            </template>
            <li class="row" style="grid-template-columns: minmax(0, 1fr) auto; border-top: 1px dashed var(--recon-border); padding-top: 0.5ch;">
              <span class="ucase">Total</span>
              <span class="amber" x-text="formatCost(data?.estimated_total)"></span>
            </li>
          </ul>
        </section>

        <section class="box box-tight box-nested stack stack-tight">
          <h3 class="box-title">MODEL</h3>
          <ul class="stack stack-tight">
            <template x-for="opt in data?.model_options" :key="opt.id">
              <li class="row row-hover"
                  style="grid-template-columns: 2ch minmax(0, 1fr) 16ch 10ch;"
                  @click="selectedModel = opt.id">
                <span class="col-mark"
                      :class="selectedModel === opt.id ? 'marker-amber' : 'marker-dim'"
                      x-text="selectedModel === opt.id ? '\u25C9' : '\u25CB'"></span>
                <span>
                  <span :class="selectedModel === opt.id ? 'amber' : ''" x-text="opt.label"></span>
                  <span class="dim" style="margin-left: 1ch;" x-text="opt.description"></span>
                </span>
                <span class="dim right"
                      x-text="'$' + opt.input_price_per_million + ' / $' + opt.output_price_per_million + ' per M'"></span>
                <span class="amber right" x-text="formatCost(opt.estimated_total)"></span>
              </li>
            </template>
          </ul>
        </section>

        <div class="inline inline-tight">
          <span class="label">Workers</span>
          <button type="button" @click="workers = Math.max(1, workers - 1)" :disabled="workers <= 1">−</button>
          <span class="amber" x-text="workers"></span>
          <button type="button" @click="workers = Math.min(16, workers + 1)" :disabled="workers >= 16">+</button>
          <span class="dim">parallel</span>
        </div>

        <p class="alert alert-info" role="note">
          Preview run &mdash; uses a deterministic fake LLM so no API charges are incurred.
          Real-LLM mode lands in a follow-up release.
        </p>

        <p class="alert alert-error" x-show="error" x-text="error"></p>

        <div class="inline">
          <button type="button" class="btn-primary" :disabled="starting" @click="start()">
            <span x-show="!starting">Start research</span>
            <span x-show="starting">Starting&hellip;</span>
          </button>
          <button type="button" @click="back()" :disabled="starting">Back</button>
        </div>
      </div>
    </section>
  </template>

  <!-- =============================================================
       Placeholder screens. The router resolves these so deep links
       never land on "unknown screen", but the features themselves
       arrive in a follow-up release. Each screen wears the same
       empty-state shell so users learn the pattern.
       ============================================================= -->

  <template id="screen-run">
    <section class="box stack" x-data="runScreen()">
      <h2 class="box-title">RUN</h2>

      <p class="alert alert-error" x-show="error" x-text="error"></p>

      <div class="row" style="grid-template-columns: minmax(0, 1fr) auto;">
        <span>
          <span class="label">▶ System</span>
          <span class="amber" :class="{ 'cursor-blink': !isTerminal }" x-text="phase"></span>
        </span>
        <span>
          <span class="label">Cost</span>
          <span class="amber" x-text="formatCost()"></span>
        </span>
      </div>

      <div class="row" role="progressbar"
           style="grid-template-columns: minmax(0, 1fr) auto;"
           :aria-valuenow="progressPercent" aria-valuemin="0" aria-valuemax="100">
        <span class="bar" x-text="progressBar"></span>
        <span class="bar-pct">
          <span x-text="String(progressPercent).padStart(3, ' ')"></span>%
        </span>
      </div>

      <section class="box box-tight box-nested stack stack-tight">
        <h3 class="box-title">ACTIVITY</h3>
        <p class="dim" x-show="activity.length === 0">Waiting for first event&hellip;</p>
        <ul class="stack stack-tight" style="max-height: 26rem; overflow-y: auto;">
          <template x-for="entry in activity" :key="entry.stamp + ':' + entry.line">
            <li class="row" style="grid-template-columns: 10ch minmax(0, 1fr); padding: 0;">
              <span class="dim" x-text="entry.stamp"></span>
              <span class="trunc" x-text="entry.line"></span>
            </li>
          </template>
        </ul>
      </section>

      <div class="inline" x-show="isTerminal">
        <button type="button" class="btn-primary"
                x-show="status === 'done'"
                @click="goToResults()">
          View results
        </button>
        <button type="button" @click="goToDashboard()">
          Dashboard
        </button>
      </div>
    </section>
  </template>

  <template id="screen-results">
    <section class="box stack" x-data="resultsScreen()">
      <h2 class="box-title">RESULTS</h2>

      <p class="dim" x-show="loading">Loading results&hellip;</p>
      <p class="alert alert-error" x-show="error" x-text="error"></p>

      <div class="stack" x-show="!loading && !error && !hasAnyArtifact">
        <p class="dim">No results yet. Run the research pipeline first.</p>
        <div class="inline">
          <a class="btn" :href="dashboardHash()">Open dashboard</a>
          <a class="btn" href="#/welcome">Back to projects</a>
        </div>
      </div>

      <div class="stack" x-show="!loading && !error && hasAnyArtifact">
        <template x-if="hasSummary">
          <section class="box box-tight box-nested stack stack-tight">
            <h3 class="box-title">EXECUTIVE SUMMARY</h3>
            <p class="dim trunc" x-text="data.executive_summary_path"></p>
            <pre style="margin: 0; padding: 1ch 2ch; background: var(--recon-surface); border: 1px solid var(--recon-border); border-radius: var(--radius-sm); max-height: 22rem; overflow-y: auto; white-space: pre-wrap; font: inherit;"
                 x-text="data.executive_summary_preview"></pre>
          </section>
        </template>

        <template x-if="(data?.theme_files?.length || 0) > 0">
          <section class="box box-tight box-nested stack stack-tight">
            <h3 class="box-title">
              <span>THEMES</span>
              <span class="dim" style="margin-left: 1ch;" x-text="data.theme_files.length + ' total'"></span>
            </h3>
            <ul class="stack stack-tight">
              <template x-for="(t, idx) in data.theme_files" :key="t.name || t.path || idx">
                <li class="row" style="grid-template-columns: 2ch minmax(0, 1fr) auto;">
                  <span class="marker marker-ok">■</span>
                  <span class="trunc">
                    <span class="amber" x-text="t.title || t.name"></span>
                    <span class="dim" style="margin-left: 1ch;" x-text="t.path"></span>
                  </span>
                  <template x-if="t.distilled_path">
                    <span class="badge" :title="t.distilled_path">distilled</span>
                  </template>
                </li>
              </template>
            </ul>
          </section>
        </template>

        <div class="inline">
          <a class="btn" :href="dashboardHash()">Dashboard</a>
          <a class="btn" href="#/welcome">Back to projects</a>
        </div>
      </div>
    </section>
  </template>

  <template id="screen-dashboard">
    <section class="box stack" x-data="dashboardScreen()">
      <h2 class="box-title">DASHBOARD</h2>

      <p class="dim" x-show="loading">Loading workspace&hellip;</p>
      <p class="alert alert-error" x-show="error" x-text="error"></p>

      <div class="stack stack-tight" x-show="!loading && workspace">
        <p>
          <span class="amber" x-text="workspace?.company_name"></span>
          <span class="dim" style="margin-left: 1ch;" x-text="workspace?.domain"></span>
        </p>
        <p class="dim">
          <span x-text="workspace?.competitor_count"></span> competitor<span x-show="workspace?.competitor_count !== 1">s</span>
          &middot;
          <span x-text="workspace?.section_count"></span> section<span x-show="workspace?.section_count !== 1">s</span>
        </p>
      </div>

      <p class="dim">
        Dashboard still under construction &mdash; resume, re-run, and browse land in
        a follow-up release.
      </p>

      <div class="inline">
        <template x-if="workspace">
          <a class="btn" :href="resumeDiscoverHash()">Resume setup</a>
        </template>
        <a class="btn" href="#/welcome">Back to projects</a>
      </div>
    </section>
  </template>

  <template id="screen-curation">
    <section class="box stack">
      <h2 class="box-title">CURATION</h2>
      <p class="dim">Theme curation still lives in the terminal UI &mdash; run
        <code>recon tui</code>. Web parity next.</p>
      <div class="inline">
        <a class="btn" href="#/welcome">Back to projects</a>
      </div>
    </section>
  </template>

  <template id="screen-browser">
    <section class="box stack">
      <h2 class="box-title">BROWSER</h2>
      <p class="dim">Per-competitor deep dives live in <code>recon tui</code>. Web parity next.</p>
      <div class="inline">
        <a class="btn" href="#/welcome">Back to projects</a>
      </div>
    </section>
  </template>

  <template id="screen-selector">
    <section class="box stack">
      <h2 class="box-title">SELECTOR</h2>
      <p class="dim">Pick-and-re-run ships with the live runner. Until then, use
        <code>recon tui</code>.</p>
      <div class="inline">
        <a class="btn" href="#/welcome">Back to projects</a>
      </div>
    </section>
  </template>

  <template id="screen-not-found">
    <section class="box stack">
      <h2 class="box-title error">NOT FOUND</h2>
      <p class="error">That route doesn&rsquo;t match any screen.</p>
      <p class="dim">No screen is registered for <code x-text="$store.router.hash"></code>.</p>
      <div class="inline">
        <a class="btn" href="#/welcome">Return home</a>
      </div>
    </section>
  </template>
</body>
</html>
